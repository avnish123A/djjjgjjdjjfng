<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>EkamGift — Premium Curated Gifts</title>
    <meta name="description" content="Discover beautifully curated gifts at EkamGift. Premium gifting for every occasion, delivered worldwide." />
    <meta name="author" content="EkamGift" />
    <meta property="og:title" content="EkamGift — Premium Curated Gifts" />
    <meta property="og:description" content="Beautifully curated gifts and lifestyle products. Premium gifting for every occasion." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ekamgift" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <div id="initial-loader" style="position:fixed;inset:0;z-index:99999;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;">
        <div style="width:56px;height:56px;perspective:120px;">
          <div style="width:100%;height:100%;border-radius:12px;background:linear-gradient(135deg,hsl(174,60%,51%),hsl(174,60%,35%));animation:cube-spin 1.4s ease-in-out infinite;"></div>
        </div>
        <img src="/logo-ekamgift.png" alt="EkamGift" style="height:36px;width:auto;opacity:.85;" />
      </div>
    </div>
    <style>
      @keyframes cube-spin {
        0%   { transform: rotateX(0deg) rotateY(0deg); }
        50%  { transform: rotateX(180deg) rotateY(90deg); }
        100% { transform: rotateX(360deg) rotateY(180deg); }
      }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
